configs:
  params:
    # Disable HTTPS redirect — Traefik handles TLS termination at the ingress
    server.insecure: "true"
    # Sub-path routing: ArgoCD is served at /argocd via Traefik IngressRoute
    server.rootpath: "/argocd"
  cm:
    # Kind/NodePort clusters: Traefik never populates Ingress ADDRESS — mark Ingress as always Healthy
    resource.customizations.health.networking.k8s.io_Ingress: |
      hs = {}
      hs.status = "Healthy"
      hs.message = "Ingress"
      return hs
    # Istio modifies webhook configs at runtime (caBundle, failurePolicy, defaults).
    # Ignore the entire webhooks array — istiod is the authoritative owner.
    resource.customizations.ignoreDifferences.admissionregistration.k8s.io_ValidatingWebhookConfiguration: |
      jqPathExpressions:
      - .webhooks[]?.clientConfig.caBundle
      - .webhooks[]?.failurePolicy
      - .webhooks[]?.matchPolicy
      - .webhooks[]?.namespaceSelector
      - .webhooks[]?.objectSelector
      - .webhooks[]?.clientConfig.service.port
    resource.customizations.ignoreDifferences.admissionregistration.k8s.io_MutatingWebhookConfiguration: |
      jqPathExpressions:
      - .webhooks[]?.clientConfig.caBundle
      - .webhooks[]?.failurePolicy
      - .webhooks[]?.matchPolicy
      - .webhooks[]?.namespaceSelector
      - .webhooks[]?.objectSelector
      - .webhooks[]?.clientConfig.service.port
      - .webhooks[]?.reinvocationPolicy

server:
  resources:
    limits:
      memory: 256Mi
      cpu: 250m
    requests:
      memory: 128Mi
      cpu: 100m
