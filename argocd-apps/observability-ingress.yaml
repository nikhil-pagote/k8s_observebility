apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: observability-ingress
  namespace: observability
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: "web"
    traefik.ingress.kubernetes.io/router.tls: "false"
  labels:
    app.kubernetes.io/part-of: observability-stack
    app.kubernetes.io/managed-by: argocd
spec:
  rules:
  - host: localhost
    http:
      paths:
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 80
      - path: /vmui
        pathType: Prefix
        backend:
          service:
            name: victoria-metrics
            port:
              number: 8428
      - path: /jaeger
        pathType: Prefix
        backend:
          service:
            name: jaeger
            port:
              number: 16686
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-vmui
  namespace: observability
  labels:
    app.kubernetes.io/part-of: observability-stack
    app.kubernetes.io/managed-by: argocd
spec:
  stripPrefix:
    prefixes:
      - /vmui
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: victoria-metrics-api
  namespace: observability
  labels:
    app.kubernetes.io/part-of: observability-stack
    app.kubernetes.io/managed-by: argocd
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`localhost`) && PathPrefix(`/vmui/api`)
      kind: Rule
      middlewares:
        - name: strip-vmui
      services:
        - name: victoria-metrics
          port: 8428
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-hosts
  namespace: observability
  labels:
    app.kubernetes.io/part-of: observability-stack
    app.kubernetes.io/managed-by: argocd
data:
  hosts.txt: |
    127.0.0.1 localhost
