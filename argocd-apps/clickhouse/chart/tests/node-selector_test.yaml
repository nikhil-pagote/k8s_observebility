suite: Test nodeSelector and tolerations
templates:
  - hyperdx/deployment.yaml

_selectors:
  deployment: &deployment-selector
    path: kind
    value: Deployment
tests:
  - it: should not include nodeSelector and tolerations when not configured
    templates:
      - hyperdx/deployment.yaml
    asserts:
      - isNull:
          path: spec.template.spec.nodeSelector
      - isNull:
          path: spec.template.spec.tolerations

  - it: should apply nodeSelector to HyperDX deployment when configured
    set:
      hyperdx:
        deployment:
          nodeSelector:
            disktype: ssd
            node-role: hyperdx-app
    templates:
      - hyperdx/deployment.yaml
    asserts:
      - documentSelector: *deployment-selector
        equal:
          path: spec.template.spec.nodeSelector
          value:
            disktype: ssd
            node-role: hyperdx-app

  - it: should apply tolerations to HyperDX deployment when configured
    set:
      hyperdx:
        deployment:
          tolerations:
            - key: hyperdx-key
              operator: Equal
              value: hyperdx-value
              effect: NoSchedule
            - key: dedicated
              operator: Equal
              value: hyperdx
              effect: NoExecute
    templates:
      - hyperdx/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.tolerations
          value:
            - key: hyperdx-key
              operator: Equal
              value: hyperdx-value
              effect: NoSchedule
            - key: dedicated
              operator: Equal
              value: hyperdx
              effect: NoExecute

  - it: should apply correct nodeSelector and tolerations to HyperDX deployment
    set:
      hyperdx:
        deployment:
          nodeSelector:
            component: api
          tolerations:
            - key: hyperdx
              operator: Equal
              value: api
              effect: NoSchedule
    templates:
      - hyperdx/deployment.yaml
    asserts:
      - documentSelector: *deployment-selector
        equal:
          path: spec.template.spec.nodeSelector
          value:
            component: api
      - documentSelector: *deployment-selector
        equal:
          path: spec.template.spec.tolerations
          value:
            - key: hyperdx
              operator: Equal
              value: api
              effect: NoSchedule

  - it: should not render nodeSelector and tolerations for disabled components
    set:
      clickhouse:
        enabled: false
      otel:
        enabled: false
      hyperdx:
        tasks:
          enabled: false
        deployment:
          nodeSelector:
            component: api
    templates:
      - hyperdx/deployment.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            component: api
