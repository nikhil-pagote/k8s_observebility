suite: Test OTEL Exporter Endpoint Configuration
templates:
  - hyperdx/configmap.yaml
tests:
  - it: should use otel-collector subchart service name for otelExporterEndpoint by default
    asserts:
      - equal:
          path: data.OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://RELEASE-NAME-otel-collector:4318"

  - it: should use custom OTEL_EXPORTER_OTLP_ENDPOINT when explicitly set in config
    set:
      hyperdx:
        config:
          OTEL_EXPORTER_OTLP_ENDPOINT: "http://custom-otel-collector:4318"
    asserts:
      - equal:
          path: data.OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://custom-otel-collector:4318"

  - it: should set empty string when OTEL_EXPORTER_OTLP_ENDPOINT is empty in config
    set:
      hyperdx:
        config:
          OTEL_EXPORTER_OTLP_ENDPOINT: ""
    asserts:
      - equal:
          path: data.OTEL_EXPORTER_OTLP_ENDPOINT
          value: ""
