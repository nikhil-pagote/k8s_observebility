suite: Test ClickStack Secret
templates:
  - hyperdx/secret.yaml
tests:
  - it: should render clickstack-secret Secret
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: clickstack-secret
      - equal:
          path: type
          value: Opaque

  - it: should contain default secret values
    asserts:
      - equal:
          path: stringData.HYPERDX_API_KEY
          value: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
      - equal:
          path: stringData.CLICKHOUSE_PASSWORD
          value: "otelcollectorpass"

  - it: should use custom secret values when provided
    set:
      hyperdx:
        secrets:
          HYPERDX_API_KEY: "custom-api-key"
          CLICKHOUSE_PASSWORD: "custom-password"
    asserts:
      - equal:
          path: stringData.HYPERDX_API_KEY
          value: "custom-api-key"
      - equal:
          path: stringData.CLICKHOUSE_PASSWORD
          value: "custom-password"

  - it: should not render secret when secrets is null and subcharts are disabled
    set:
      hyperdx:
        secrets: null
      mongodb:
        enabled: false
      clickhouse:
        enabled: false
      otel-collector:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should fail when secrets is null but mongodb is enabled
    set:
      hyperdx:
        secrets: null
      mongodb:
        enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "hyperdx.secrets cannot be null when mongodb, clickhouse, or otel-collector is enabled -- these subcharts require the clickstack-secret for credentials"

  - it: should fail when secrets is null but clickhouse is enabled
    set:
      hyperdx:
        secrets: null
      clickhouse:
        enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "hyperdx.secrets cannot be null when mongodb, clickhouse, or otel-collector is enabled -- these subcharts require the clickstack-secret for credentials"

  - it: should fail when secrets is null but otel-collector is enabled
    set:
      hyperdx:
        secrets: null
      otel-collector:
        enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "hyperdx.secrets cannot be null when mongodb, clickhouse, or otel-collector is enabled -- these subcharts require the clickstack-secret for credentials"
