suite: Test HyperDX Deployment
templates:
  - hyperdx/deployment.yaml
tests:
  - it: should render deployment correctly with default values
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 1
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ^docker\.hyperdx\.io/hyperdx/hyperdx:(\d+\.\d+\.\d+|\d+-nightly)$
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 3000
      - equal:
          path: spec.template.spec.containers[0].ports[1].containerPort
          value: 8000
      - equal:
          path: spec.template.spec.containers[0].ports[2].containerPort
          value: 4320
      - isSubset:
          path: spec.template.spec.containers[0].envFrom[0]
          content:
            configMapRef:
              name: clickstack-config
      - isSubset:
          path: spec.template.spec.containers[0].envFrom[1]
          content:
            secretRef:
              name: clickstack-secret

  - it: should set custom replicas when provided
    set:
      hyperdx:
        deployment:
          replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should add custom annotations when provided
    set:
      hyperdx:
        deployment:
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "3000"
    asserts:
      - isSubset:
          path: spec.template.metadata.annotations
          content:
            prometheus.io/scrape: "true"
            prometheus.io/port: "3000"

  - it: should add custom labels when provided
    set:
      hyperdx:
        deployment:
          labels:
            environment: production
            team: platform
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            environment: production
            team: platform

  - it: should add custom environment variables when provided
    set:
      hyperdx:
        deployment:
          env:
            - name: CUSTOM_ENV
              value: "test-value"
            - name: ANOTHER_ENV
              value: "another-value"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUSTOM_ENV
            value: "test-value"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ANOTHER_ENV
            value: "another-value"

  - it: should expose OpAMP container port with default values
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[2].containerPort
          value: 4320
      - equal:
          path: spec.template.spec.containers[0].ports[2].name
          value: opamp-port

  - it: should use custom OpAMP port when provided
    set:
      hyperdx:
        ports:
          opamp: 5320
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[2].containerPort
          value: 5320
  - it: should include initContainers when mongodb.enabled is true
    set:
      mongodb:
        enabled: true
    asserts:
      - isNotEmpty:
          path: spec.template.spec.initContainers
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-mongodb
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: busybox@sha256:1fcf5df59121b92d61e066df1788e8df0cc35623f5d62d9679a41e163b6a0cdb
      - equal:
          path: spec.template.spec.initContainers[0].imagePullPolicy
          value: IfNotPresent
      - contains:
          path: spec.template.spec.initContainers[0].command
          content: sh
      - contains:
          path: spec.template.spec.initContainers[0].command
          content: -c
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "until nc -z .+-mongodb-svc 27017; do echo waiting for mongodb; sleep 2; done;"

  - it: should allow overriding initContainer image and pullPolicy
    set:
      mongodb:
        enabled: true
      hyperdx:
        deployment:
          waitForMongodb:
            image: busybox:1.36.1
            pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: busybox:1.36.1
      - equal:
          path: spec.template.spec.initContainers[0].imagePullPolicy
          value: Always

  - it: should not include initContainers when mongodb is disabled and no user init containers are provided
    set:
      mongodb:
        enabled: false
    asserts:
      - isNull:
          path: spec.template.spec.initContainers

  - it: should render only user-provided initContainers when mongodb is disabled
    set:
      mongodb:
        enabled: false
      hyperdx:
        deployment:
          initContainers:
            - name: fetch-cert
              image: busybox:1.36.1
              command: ['sh', '-c', 'wget -O /certs/bundle.pem https://example.com/bundle.pem']
              volumeMounts:
                - name: certs
                  mountPath: /certs
    asserts:
      - lengthEqual:
          path: spec.template.spec.initContainers
          count: 1
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: fetch-cert
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: busybox:1.36.1
      - equal:
          path: spec.template.spec.initContainers[0].volumeMounts[0].mountPath
          value: /certs

  - it: should render wait-for-mongodb first then user initContainers when both are set
    set:
      mongodb:
        enabled: true
      hyperdx:
        deployment:
          initContainers:
            - name: fetch-cert
              image: busybox:1.36.1
              command: ['sh', '-c', 'wget -O /certs/bundle.pem https://example.com/bundle.pem']
    asserts:
      - lengthEqual:
          path: spec.template.spec.initContainers
          count: 2
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-mongodb
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: fetch-cert

  - it: should not include volumes by default
    asserts:
      - isNull:
          path: spec.template.spec.volumes

  - it: should render user-provided volumes when set
    set:
      hyperdx:
        deployment:
          volumes:
            - name: certs
              emptyDir: {}
            - name: saml-cert
              configMap:
                name: hyperdx-saml-cert
    asserts:
      - lengthEqual:
          path: spec.template.spec.volumes
          count: 2
      - equal:
          path: spec.template.spec.volumes[0].name
          value: certs
      - isSubset:
          path: spec.template.spec.volumes[0]
          content:
            emptyDir: {}
      - equal:
          path: spec.template.spec.volumes[1].name
          value: saml-cert
      - equal:
          path: spec.template.spec.volumes[1].configMap.name
          value: hyperdx-saml-cert

  - it: should not include volumeMounts on the app container by default
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].volumeMounts

  - it: should render user-provided volumeMounts on the app container including subPath and readOnly
    set:
      hyperdx:
        deployment:
          volumeMounts:
            - name: certs
              mountPath: /certs
            - name: saml-cert
              mountPath: /etc/hyperdx/idp-cert.pem
              subPath: idp-cert.pem
              readOnly: true
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[0].volumeMounts
          count: 2
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].name
          value: certs
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].mountPath
          value: /certs
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].name
          value: saml-cert
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].mountPath
          value: /etc/hyperdx/idp-cert.pem
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].subPath
          value: idp-cert.pem
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].readOnly
          value: true

  - it: should include livenessProbe with default values when enabled
    asserts:
      - isSubset:
          path: spec.template.spec.containers[0].livenessProbe
          content:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

  - it: should include readinessProbe with default values when enabled
    asserts:
      - isSubset:
          path: spec.template.spec.containers[0].readinessProbe
          content:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 1
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

  - it: should not include livenessProbe when disabled
    set:
      hyperdx:
        deployment:
          livenessProbe:
            enabled: false
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].livenessProbe

  - it: should not include readinessProbe when disabled
    set:
      hyperdx:
        deployment:
          readinessProbe:
            enabled: false
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should use custom livenessProbe values when provided
    set:
      hyperdx:
        deployment:
          livenessProbe:
            enabled: true
            initialDelaySeconds: 20
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
    asserts:
      - isSubset:
          path: spec.template.spec.containers[0].livenessProbe
          content:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5

  - it: should use custom readinessProbe values when provided
    set:
      hyperdx:
        deployment:
          readinessProbe:
            enabled: true
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 2
    asserts:
      - isSubset:
          path: spec.template.spec.containers[0].readinessProbe
          content:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 2

  - it: should use custom apiPort in probes when provided
    set:
      hyperdx:
        ports:
          api: 9000
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 9000
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 9000

  - it: should not set serviceAccountName by default
    asserts:
      - isNull:
          path: spec.template.spec.serviceAccountName

  - it: should set serviceAccountName when serviceAccount.create is true
    set:
      hyperdx:
        serviceAccount:
          create: true
    asserts:
      - matchRegex:
          path: spec.template.spec.serviceAccountName
          pattern: -app$

  - it: should set serviceAccountName to existing SA when create is false but name is set
    set:
      hyperdx:
        serviceAccount:
          create: false
          name: "my-existing-sa"
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: my-existing-sa

  - it: should use custom name in serviceAccountName when create is true and name is set
    set:
      hyperdx:
        serviceAccount:
          create: true
          name: "my-custom-sa"
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: my-custom-sa

  - it: should not include imagePullSecrets when not configured
    asserts:
      - isNull:
          path: spec.template.spec.imagePullSecrets

  - it: should include imagePullSecrets when configured with single secret
    set:
      global:
        imagePullSecrets:
          - name: regcred
    asserts:
      - isNotNull:
          path: spec.template.spec.imagePullSecrets
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: regcred
      - lengthEqual:
          path: spec.template.spec.imagePullSecrets
          count: 1

  - it: should include imagePullSecrets when configured with multiple secrets
    set:
      global:
        imagePullSecrets:
          - name: regcred
          - name: docker-hub-secret
          - name: private-registry-secret
    asserts:
      - isNotNull:
          path: spec.template.spec.imagePullSecrets
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: regcred
      - equal:
          path: spec.template.spec.imagePullSecrets[1].name
          value: docker-hub-secret
      - equal:
          path: spec.template.spec.imagePullSecrets[2].name
          value: private-registry-secret
      - lengthEqual:
          path: spec.template.spec.imagePullSecrets
          count: 3
