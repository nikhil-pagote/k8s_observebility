suite: Test ServiceAccount
templates:
  - hyperdx/serviceaccount.yaml
tests:
  - it: should not render ServiceAccount when create is false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ServiceAccount when create is true
    set:
      hyperdx:
        serviceAccount:
          create: true
    asserts:
      - isKind:
          of: ServiceAccount
      - matchRegex:
          path: metadata.name
          pattern: -app$

  - it: should use custom name when provided
    set:
      hyperdx:
        serviceAccount:
          create: true
          name: "my-custom-sa"
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-sa

  - it: should use fullnameOverride for ServiceAccount name when name is empty
    set:
      fullnameOverride: hyperdx-api
      hyperdx:
        serviceAccount:
          create: true
    asserts:
      - equal:
          path: metadata.name
          value: hyperdx-api

  - it: should render annotations when provided
    set:
      hyperdx:
        serviceAccount:
          create: true
          annotations:
            eks.amazonaws.com/role-arn: "arn:aws:iam::123456789:role/my-role"
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789:role/my-role"

  - it: should not render annotations section when empty
    set:
      hyperdx:
        serviceAccount:
          create: true
          annotations: {}
    asserts:
      - isNull:
          path: metadata.annotations

  - it: should not render ServiceAccount when create is false even with name set
    set:
      hyperdx:
        serviceAccount:
          create: false
          name: "my-existing-sa"
    asserts:
      - hasDocuments:
          count: 0
