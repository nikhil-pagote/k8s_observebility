suite: Test ClickStack ConfigMap Labels
templates:
  - hyperdx/configmap.yaml

tests:
  - it: should include proper labels
    release:
      name: test-release
    chart:
      version: 1.0.0
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: clickstack-config
      - matchRegex:
          path: metadata.labels["helm.sh/chart"]
          pattern: "clickstack-"
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: clickstack
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: test-release
