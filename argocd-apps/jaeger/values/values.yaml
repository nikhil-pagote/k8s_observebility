storage:
  type: memory
  options:
    memory:
      maxTraces: 50000

userconfig:
  extensions:
    jaeger_query:
      base_path: /jaeger

query:
  service:
    type: ClusterIP
  resources:
    limits:
      memory: 512Mi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 250m

collector:
  service:
    type: ClusterIP
  resources:
    limits:
      memory: 512Mi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 250m

agent:
  enabled: false

cassandra:
  enabled: false

elasticsearch:
  enabled: false

kafka:
  enabled: false

ingress:
  enabled: false

serviceAccount:
  create: true
  name: jaeger
