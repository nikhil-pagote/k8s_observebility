mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib

command:
  name: otelcol-contrib

service:
  type: ClusterIP

ports:
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP

serviceAccount:
  create: true
  name: opentelemetry-collector
  annotations: {}

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["nodes", "nodes/metrics", "nodes/proxy", "services", "endpoints", "pods", "namespaces"]
      verbs: ["get", "list", "watch"]
    - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
      verbs: ["get"]

resources:
  limits:
    memory: 512Mi
    cpu: 500m
  requests:
    memory: 256Mi
    cpu: 250m

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

    prometheus:
      config:
        scrape_configs:
          - job_name: victoria-metrics
            static_configs:
              - targets: ['victoria-metrics.observability.svc.cluster.local:8428']

          - job_name: opentelemetry-collector
            static_configs:
              - targets: ['opentelemetry-collector.observability.svc.cluster.local:8888']

          - job_name: pushgateway
            static_configs:
              - targets: ['pushgateway.observability.svc.cluster.local:9091']
            honor_labels: true

          - job_name: kube-state-metrics
            static_configs:
              - targets: ['kube-state-metrics.observability.svc.cluster.local:8080']

          - job_name: node-exporter
            kubernetes_sd_configs:
              - role: endpoints
                namespaces:
                  names: [observability]
            relabel_configs:
              - source_labels: [__meta_kubernetes_service_name]
                action: keep
                regex: node-exporter
              - source_labels: [__meta_kubernetes_endpoint_node_name]
                target_label: node

          - job_name: kubernetes-cadvisor
            kubernetes_sd_configs:
              - role: node
            scheme: https
            tls_config:
              ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              insecure_skip_verify: true
            bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
            relabel_configs:
              - action: labelmap
                regex: __meta_kubernetes_node_label_(.+)
              - target_label: __address__
                replacement: kubernetes.default.svc:443
              - source_labels: [__meta_kubernetes_node_name]
                regex: (.+)
                target_label: __metrics_path__
                replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
              - source_labels: [__meta_kubernetes_node_name]
                target_label: node

          - job_name: kubernetes-pods
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                action: keep
                regex: true
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)
              - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                action: replace
                regex: ([^:]+)(?::\d+)?;(\d+)
                replacement: $1:$2
                target_label: __address__
              - action: labelmap
                regex: __meta_kubernetes_pod_label_(.+)
              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: kubernetes_namespace
              - source_labels: [__meta_kubernetes_pod_name]
                action: replace
                target_label: kubernetes_pod_name


          - job_name: kubernetes-service-endpoints
            kubernetes_sd_configs:
              - role: endpoints
            relabel_configs:
              - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
                action: keep
                regex: true
              - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)
              - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
                action: replace
                regex: ([^:]+)(?::\d+)?;(\d+)
                replacement: $1:$2
                target_label: __address__
              - action: labelmap
                regex: __meta_kubernetes_service_label_(.+)
              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: kubernetes_namespace
              - source_labels: [__meta_kubernetes_service_name]
                action: replace
                target_label: kubernetes_name

  processors:
    batch:
      timeout: 1s
      send_batch_size: 1024
    memory_limiter:
      check_interval: 1s
      limit_mib: 1500
    resource:
      attributes:
        - key: k8s.cluster.name
          value: "observability-cluster"
          action: upsert
    transform/traefik_labels:
      metric_statements:
        - context: datapoint
          statements:
            - set(attributes["pod"], resource.attributes["pod"]) where resource.attributes["pod"] != nil
            - set(attributes["host"], ExtractPatterns(attributes["router"], ".*-(?P<host>[^-]+)-[^-]+@kubernetes$")["host"]) where IsMatch(attributes["router"], ".*@kubernetes$")

  exporters:
    prometheusremotewrite:
      endpoint: "http://victoria-metrics.observability.svc.cluster.local:8428/api/v1/write"
      external_labels:
        cluster: observability-cluster
        origin_prometheus: otel-collector
      tls:
        insecure: true
    debug:
      verbosity: detailed
    otlp/jaeger:
      endpoint: "jaeger-collector.observability.svc.cluster.local:14250"
      tls:
        insecure: true
    otlphttp/loki:
      endpoint: "http://loki.observability.svc.cluster.local:3100/otlp"
      tls:
        insecure: true

  service:
    telemetry:
      metrics:
        address: 0.0.0.0:8888
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [debug, otlp/jaeger]
      metrics:
        receivers: [otlp, prometheus]
        processors: [memory_limiter, resource, transform/traefik_labels, batch]
        exporters: [prometheusremotewrite, debug]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [otlphttp/loki, debug]
