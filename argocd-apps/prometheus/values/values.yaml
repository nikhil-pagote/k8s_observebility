server:
  retention: 15d
  replicas: 1
  resources:
    limits:
      memory: 2Gi
      cpu: 1000m
    requests:
      memory: 1Gi
      cpu: 500m
  persistence:
    enabled: true
    size: 20Gi
  service:
    type: ClusterIP
    port: 9090
  extraScrapeConfigs:
    - job_name: 'opentelemetry-collector'
      static_configs:
        - targets: ['opentelemetry-collector-metrics.observability.svc.cluster.local:9464']
      metrics_path: /metrics
      scrape_interval: 15s
      scrape_timeout: 10s

alertmanager:
  enabled: true
  resources:
    limits:
      memory: 256Mi
      cpu: 250m
    requests:
      memory: 128Mi
      cpu: 100m
  persistence:
    enabled: true
    size: 5Gi

kube-state-metrics:
  enabled: false

node-exporter:
  enabled: false
