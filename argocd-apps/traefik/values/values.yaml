deployment:
  replicas: 1

resources:
  limits:
    memory: 256Mi
    cpu: 250m
  requests:
    memory: 128Mi
    cpu: 100m

service:
  spec:
    type: NodePort

ports:
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
    nodePort: 30080
    protocol: TCP
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
    nodePort: 30443
    protocol: TCP
  metrics:
    port: 8082
    expose:
      default: false
    protocol: TCP

api:
  dashboard: true
  insecure: true

# Built-in dashboard IngressRoute disabled — the dashboard is exposed via the
# manual traefik-alias IngressRoute in extraObjects, which rewrites /traefik
# to /dashboard/ using replacePathRegex. Enabling this would create a redundant
# route that exposes /dashboard directly without going through /traefik.
# ingressRoute:
#   dashboard:
#     enabled: true
#     entryPoints:
#       - web

metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addServicesLabels: true

providers:
  kubernetesCRD:
    allowCrossNamespace: true

additionalArguments:
  - "--providers.kubernetesingress.ingressclass=traefik"

extraObjects:
  - apiVersion: traefik.io/v1alpha1
    kind: Middleware
    metadata:
      name: traefik-dashboard-rewrite
      namespace: traefik
    spec:
      replacePathRegex:
        regex: "^/traefik/?$"
        replacement: "/dashboard/"
  - apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    metadata:
      name: traefik-alias
      namespace: traefik
    spec:
      entryPoints:
        - web
      routes:
        - match: PathPrefix(`/traefik`)
          kind: Rule
          middlewares:
            - name: traefik-dashboard-rewrite
          services:
            - name: api@internal
              kind: TraefikService
  - apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    metadata:
      name: argocd
      namespace: traefik
    spec:
      entryPoints:
        - web
      routes:
        - match: PathPrefix(`/argocd`)
          kind: Rule
          services:
            - name: argocd-server
              namespace: argocd
              port: 80
