deployment:
  replicas: 1

resources:
  limits:
    memory: 256Mi
    cpu: 250m
  requests:
    memory: 128Mi
    cpu: 100m

service:
  spec:
    type: NodePort

ports:
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
    nodePort: 30080
    protocol: TCP
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
    nodePort: 30443
    protocol: TCP
  metrics:
    port: 8082
    expose:
      default: false
    protocol: TCP

api:
  dashboard: true
  insecure: true

ingressRoute:
  dashboard:
    enabled: true
    entryPoints:
      - web
    matchRule: PathPrefix(`/api`) || PathPrefix(`/dashboard`)

metrics:
  prometheus: null

providers:
  kubernetesCRD:
    allowCrossNamespace: true

additionalArguments:
  - "--providers.kubernetesingress.ingressclass=traefik"

extraObjects:
  - apiVersion: traefik.io/v1alpha1
    kind: Middleware
    metadata:
      name: traefik-to-dashboard
      namespace: traefik
    spec:
      redirectRegex:
        regex: "^(https?://[^/]+)/traefik/?$"
        replacement: "$1/dashboard/"
        permanent: false
  - apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    metadata:
      name: traefik-alias
      namespace: traefik
    spec:
      entryPoints:
        - web
      routes:
        - match: Path(`/traefik`) || Path(`/traefik/`)
          kind: Rule
          middlewares:
            - name: traefik-to-dashboard
          services:
            - name: api@internal
              kind: TraefikService
  - apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    metadata:
      name: argocd
      namespace: traefik
    spec:
      entryPoints:
        - web
      routes:
        - match: PathPrefix(`/argocd`)
          kind: Rule
          services:
            - name: argocd-server
              namespace: argocd
              port: 80
