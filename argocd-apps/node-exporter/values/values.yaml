fullnameOverride: node-exporter

resources:
  limits:
    memory: 128Mi
    cpu: 250m
  requests:
    memory: 64Mi
    cpu: 100m

service:
  type: ClusterIP
  port: 9100
  # Override chart default of prometheus.io/scrape: "true" — OTel uses a
  # dedicated endpoint SD job for node-exporter, not annotation discovery
  annotations:
    prometheus.io/scrape: "false"
