adminPassword: admin123

image:
  tag: "12.4.3"

initChownData:
  enabled: false

service:
  type: ClusterIP

persistence:
  enabled: true
  size: 10Gi

resources:
  limits:
    memory: 1Gi
    cpu: 1000m
  requests:
    memory: 512Mi
    cpu: 500m

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        url: http://victoria-metrics.observability.svc.cluster.local:8428
        access: proxy
        isDefault: true
        editable: true
        jsonData:
          timeInterval: 15s
          queryTimeout: 60s
          httpMethod: POST
      - name: Loki
        type: loki
        url: http://loki.observability.svc.cluster.local:3100
        access: proxy
        editable: true

dashboards:
  default:
    kubernetes-overview:
      json: |
        {
          "title": "Kubernetes Overview",
          "uid": "k8s-custom-overview",
          "timezone": "browser",
          "refresh": "30s",
          "schemaVersion": 38,
          "time": {"from": "now-1h", "to": "now"},
          "templating": {
            "list": [
              {
                "name": "datasource",
                "type": "datasource",
                "pluginId": "prometheus",
                "hide": 0,
                "label": "Datasource"
              }
            ]
          },
          "panels": [
            {
              "id": 1, "type": "stat", "title": "Nodes",
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0},
              "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "graphMode": "none"},
              "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "count(kube_node_info)", "legendFormat": "", "refId": "A"}]
            },
            {
              "id": 2, "type": "stat", "title": "Pods",
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "gridPos": {"h": 4, "w": 4, "x": 4, "y": 0},
              "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "graphMode": "none"},
              "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "count(kube_pod_info)", "legendFormat": "", "refId": "A"}]
            },
            {
              "id": 3, "type": "stat", "title": "Namespaces",
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "gridPos": {"h": 4, "w": 4, "x": 8, "y": 0},
              "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "graphMode": "none"},
              "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "count(count(kube_pod_info) by (namespace))", "legendFormat": "", "refId": "A"}]
            },
            {
              "id": 4, "type": "stat", "title": "Cluster CPU Usage",
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
              "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "area"},
              "fieldConfig": {
                "defaults": {
                  "unit": "percent", "min": 0, "max": 100,
                  "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 90}]}
                }
              },
              "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\"}[5m])) / sum(kube_node_status_allocatable{resource=\"cpu\",unit=\"core\"}) * 100", "legendFormat": "CPU %", "refId": "A"}]
            },
            {
              "id": 5, "type": "stat", "title": "Cluster Memory Usage",
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
              "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "area"},
              "fieldConfig": {
                "defaults": {
                  "unit": "percent", "min": 0, "max": 100,
                  "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 90}]}
                }
              },
              "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "sum(container_memory_working_set_bytes{container!=\"\"}) / sum(kube_node_status_allocatable{resource=\"memory\",unit=\"byte\"}) * 100", "legendFormat": "Memory %", "refId": "A"}]
            },
            {
              "id": 6, "type": "timeseries", "title": "CPU Usage % by Node",
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
              "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "custom": {"lineWidth": 2, "fillOpacity": 10}}},
              "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\"}[5m])) by (node) / sum(kube_node_status_allocatable{resource=\"cpu\",unit=\"core\"}) by (node) * 100", "legendFormat": "{{node}}", "refId": "A"}]
            },
            {
              "id": 7, "type": "timeseries", "title": "Memory Usage % by Node",
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
              "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "custom": {"lineWidth": 2, "fillOpacity": 10}}},
              "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "sum(container_memory_working_set_bytes{container!=\"\"}) by (node) / sum(kube_node_status_allocatable{resource=\"memory\",unit=\"byte\"}) by (node) * 100", "legendFormat": "{{node}}", "refId": "A"}]
            },
            {
              "id": 8, "type": "table", "title": "Pods by Namespace",
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "gridPos": {"h": 8, "w": 6, "x": 0, "y": 12},
              "options": {"sortBy": [{"desc": true, "displayName": "Pods"}]},
              "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "sort_desc(count(kube_pod_info) by (namespace))", "legendFormat": "{{namespace}}", "instant": true, "refId": "A"}],
              "transformations": [{"id": "organize", "options": {"renameByName": {"Value": "Pods", "namespace": "Namespace"}}}]
            },
            {
              "id": 9, "type": "timeseries", "title": "Network I/O by Node",
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "gridPos": {"h": 8, "w": 18, "x": 6, "y": 12},
              "fieldConfig": {"defaults": {"unit": "Bps", "custom": {"lineWidth": 2, "fillOpacity": 5}}},
              "targets": [
                {"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "sum(rate(container_network_receive_bytes_total[5m])) by (node)", "legendFormat": "rx · {{node}}", "refId": "A"},
                {"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "sum(rate(container_network_transmit_bytes_total[5m])) by (node)", "legendFormat": "tx · {{node}}", "refId": "B"}
              ]
            }
          ]
        }
    traefik:
      gnetId: 25330
      revision: 1
      datasource: VictoriaMetrics
    node-exporter:
      gnetId: 1860
      revision: 22
      datasource: VictoriaMetrics
    victoria-metrics:
      gnetId: 10229
      revision: 35
      datasource: VictoriaMetrics

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards/default

grafana.ini:
  server:
    root_url: http://localhost:30080/grafana
    serve_from_sub_path: true
  auth.anonymous:
    enabled: false
  security:
    allow_embedding: true
