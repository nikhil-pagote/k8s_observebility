adminPassword: admin123

image:
  tag: "12.4.3"

initChownData:
  enabled: false

service:
  type: ClusterIP

persistence:
  enabled: true
  size: 10Gi

resources:
  limits:
    memory: 1Gi
    cpu: 1000m
  requests:
    memory: 512Mi
    cpu: 500m

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        url: http://victoria-metrics.observability.svc.cluster.local:8428
        access: proxy
        isDefault: true
        editable: true
        jsonData:
          timeInterval: 15s
          queryTimeout: 60s
          httpMethod: POST
      - name: Loki
        type: loki
        url: http://loki.observability.svc.cluster.local:3100
        access: proxy
        editable: true

dashboards:
  default:
    kubernetes-views-global:
      gnetId: 15661
      revision: 2
      datasource: VictoriaMetrics
    traefik:
      gnetId: 25330
      revision: 1
      datasource: VictoriaMetrics
    node-exporter:
      gnetId: 1860
      revision: 22
      datasource: VictoriaMetrics
    victoria-metrics:
      gnetId: 10229
      revision: 35
      datasource: VictoriaMetrics

extraInitContainers:
  - name: fix-dashboard-datasources
    image: python:3.11-alpine
    command: ["/bin/sh", "-c"]
    args:
      - |
        python3 - << 'PYEOF'
        import json

        filepath = '/var/lib/grafana/dashboards/default/kubernetes-views-global.json'
        try:
            with open(filepath) as f:
                d = json.load(f)
        except Exception as e:
            print(f"Error reading dashboard: {e}")
            exit(0)

        d.pop('__inputs', None)
        d.pop('__requires', None)

        ds_var = {
            "name": "datasource", "type": "datasource",
            "pluginId": "prometheus", "hide": 0,
            "label": "Datasource", "refresh": 1,
            "options": [], "current": {}
        }
        var_list = d.get('templating', {}).get('list', [])
        var_list = [v for v in var_list if v.get('name') != 'datasource']
        d['templating']['list'] = [ds_var] + var_list

        content = json.dumps(d)
        content = content.replace('${DS__VICTORIAMETRICS-PROD-ALL}', '${datasource}')
        content = content.replace('${DS_PROMETHEUS}', '${datasource}')

        with open(filepath, 'w') as f:
            f.write(content)
        print("Dashboard patched OK")
        PYEOF
    volumeMounts:
      - name: storage
        mountPath: /var/lib/grafana

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards/default

grafana.ini:
  server:
    root_url: http://localhost:30080/grafana
    serve_from_sub_path: true
  auth.anonymous:
    enabled: false
  security:
    allow_embedding: true
